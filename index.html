<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0F17" />
  <title>Simulador Imobiliário PT · Fiscalidade 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;background:#0B0F17;overflow-x:hidden;-webkit-text-size-adjust:100%;}
    body{font-family:'Inter',system-ui,sans-serif;}
    #root{overflow-x:hidden;}
    svg{max-width:100%;}
    input,select,button,textarea{font-family:inherit;}
    input[type=range]{-webkit-appearance:none;appearance:none;background:#26334D;border-radius:999px;height:4px;width:100%;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#4F9CE0;cursor:pointer;border:2px solid #0B0F17;}
    input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#4F9CE0;cursor:pointer;border:2px solid #0B0F17;}
    input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{opacity:.3;}
    *:focus-visible{outline:2px solid #4F9CE0;outline-offset:1px;}
    .wrap{max-width:1100px;margin:0 auto;padding-left:16px;padding-right:16px;}
    .grid{display:grid;}
    .layout-grid{display:grid;gap:20px;grid-template-columns:1fr;}
    @media (min-width:880px){.layout-grid{grid-template-columns:minmax(0,340px) minmax(0,1fr);}}
    .g2{grid-template-columns:1fr 1fr;gap:12px;}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    @media (min-width:620px){.cards-3{grid-template-columns:1fr 1fr 1fr;}.cards-4{grid-template-columns:1fr 1fr 1fr 1fr;}}
    .cmp-cards{display:grid;grid-template-columns:1fr;gap:12px;}
    @media (min-width:760px){.cmp-cards{grid-template-columns:1fr 1fr 1fr;}.cmp-charts{grid-template-columns:1fr 1fr;}.gloss{grid-template-columns:1fr 1fr;}}
    .cmp-charts{display:grid;grid-template-columns:1fr;gap:16px;}
    .gloss{display:grid;grid-template-columns:1fr;gap:16px;}
    .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    @media (prefers-reduced-motion: reduce){*{transition:none!important;}}
  </style>
</head>
<body>
  <div id="root"></div>

ment("span",{style:{flex:1,height:1,background:v.borderSoft}}))}var mm=[{grupo:"As tr\xEAs estrat\xE9gias",cor:v.terra,termos:[{t:"Reabilitar & Arrendar (BRRR)",d:"Sigla inglesa para Buy, Rehab, Rent, Refinance, Repeat: comprar um im\xF3vel degradado, recuper\xE1-lo, arrend\xE1-lo e depois pedir um novo cr\xE9dito sobre o valor j\xE1 valorizado para recuperar parte do dinheiro investido \u2014 e repetir noutro im\xF3vel. Gera renda mensal e vai libertando capital."},{t:"Reabilitar & Revender (Flip)",d:"Comprar barato, fazer obras e vender rapidamente com lucro. N\xE3o h\xE1 arrendamento: ganhas (ou perdes) na diferen\xE7a entre o que gastaste e o que vendeste, depois de pagar impostos sobre o lucro."},{t:"Terreno & Construir",d:"Comprar um terreno onde se pode construir, edificar uma casa nova de raiz e depois arrend\xE1-la ou vend\xEA-la. Tem custos extra (projeto, licen\xE7as) e um IMT diferente do de comprar casa pronta."}]},{grupo:"Compra e impostos iniciais",cor:v.azulejo,termos:[{t:"IMT",d:"Imposto Municipal sobre as Transmiss\xF5es Onerosas de Im\xF3veis. Paga-se uma \xFAnica vez, ao comprar, antes da escritura. Quanto mais caro o im\xF3vel, maior a taxa. Habita\xE7\xE3o secund\xE1ria calcula-se por escal\xF5es; terreno de constru\xE7\xE3o tem taxa fixa de 6,5%."},{t:"Imposto do Selo",d:"Imposto fixo de 0,8% sobre o valor de compra, pago tamb\xE9m no momento da aquisi\xE7\xE3o. Simples: pre\xE7o \xD7 0,8%."},{t:"Escritura + registo",d:"Custos do not\xE1rio (formaliza a compra) e do registo predial (regista que o im\xF3vel passou a ser teu)."},{t:"IMT Jovem",d:"Benef\xEDcio que isenta de IMT a primeira compra de casa pr\xF3pria e permanente por pessoas at\xE9 35 anos, at\xE9 certo valor. N\xE3o se aplica a investimento \u2014 est\xE1 aqui s\xF3 para compara\xE7\xE3o."},{t:"VPT (Valor Patrimonial Tribut\xE1rio)",d:"O valor 'oficial' que as Finan\xE7as atribuem ao im\xF3vel. Costuma ser inferior ao de mercado e serve de base ao c\xE1lculo do IMI anual."}]},{grupo:"Financiamento (o cr\xE9dito)",cor:v.gold,termos:[{t:"Capital pr\xF3prio",d:"O dinheiro teu que tens mesmo de p\xF4r do teu bolso: tudo o que o banco n\xE3o financia \u2014 a entrada, as obras n\xE3o cobertas pelo cr\xE9dito e todos os impostos e custos da compra. \xC9 o n\xFAmero-chave para saber se consegues fazer o neg\xF3cio."},{t:"LTV (Loan-to-Value)",d:"A percentagem do valor que o banco empresta. LTV de 80% significa que o banco financia 80% e tu entras com 20% (a 'entrada'). Em investimento ronda os 80%; em casa pr\xF3pria pode chegar a 90%."},{t:"TAN (Taxa Anual Nominal)",d:"A taxa de juro anual do empr\xE9stimo \u2014 o que pagas ao banco por te emprestar o dinheiro. Quanto mais alta, maior a presta\xE7\xE3o."},{t:"Prazo",d:"O n\xFAmero de anos para pagar o empr\xE9stimo. Prazos mais longos baixam a presta\xE7\xE3o mensal, mas pagas mais juros no total."},{t:"Car\xEAncia de capital",d:"Per\xEDodo inicial (em meses) em que s\xF3 pagas juros e ainda n\xE3o abates a d\xEDvida. A presta\xE7\xE3o \xE9 mais baixa \u2014 \xFAtil durante as obras, antes de haver renda a entrar."},{t:"Montante financiado",d:"O total que o banco empresta. Resulta de aplicar o LTV ao valor de compra (e \xE0s obras, se o banco tamb\xE9m as financiar)."},{t:"Presta\xE7\xE3o",d:"O valor que pagas ao banco por m\xEAs. A app mostra duas: a mais baixa durante a car\xEAncia (s\xF3 juros) e a normal depois (juros + amortiza\xE7\xE3o)."}]},{grupo:"Patrim\xF3nio e valoriza\xE7\xE3o",cor:v.pos,termos:[{t:"Equity",d:"A parte do im\xF3vel que \xE9 mesmo tua: o valor do im\xF3vel menos o que ainda deves ao banco. Casa de \u20AC200.000 com \u20AC150.000 de d\xEDvida = \u20AC50.000 de equity."},{t:"Equity criada no dia 1",d:"A equity que existe logo ap\xF3s as obras: valor p\xF3s-obras menos a d\xEDvida. Mede o patrim\xF3nio que j\xE1 'ganhaste' assim que o projeto fica pronto."},{t:"Valoriza\xE7\xE3o for\xE7ada",d:"O aumento de valor criado pela tua pr\xF3pria obra: valor p\xF3s-obras menos (pre\xE7o de compra + obras). \xC9 a mais-valia que tu provocaste, ao contr\xE1rio da subida natural do mercado."},{t:"Valor p\xF3s-obras / avalia\xE7\xE3o",d:"Quanto o im\xF3vel passa a valer depois de recuperado ou constru\xEDdo. Base para equity, refinanciamento e venda."},{t:"Valoriza\xE7\xE3o anual",d:"A subida de pre\xE7o estimada do im\xF3vel por ano (%), devida ao mercado. Usada para projetar o valor futuro."}]},{grupo:"Rendimento e rentabilidade (arrendar)",cor:v.azulejo,termos:[{t:"Cashflow",d:"O dinheiro que efetivamente te sobra (ou falta) cada m\xEAs depois de receber a renda e pagar tudo: presta\xE7\xE3o, encargos e impostos. Positivo = o im\xF3vel paga-se a si pr\xF3prio e gera lucro; negativo = tens de meter dinheiro todos os meses."},{t:"Yield bruto",d:"A renda de um ano a dividir pelo valor do im\xF3vel (%). Rendimento 'em bruto', antes de despesas e impostos. \xDAtil para comparar im\xF3veis depressa."},{t:"Yield l\xEDquido",d:"Como o bruto, mas depois de tirar despesas e IRS (e antes do financiamento). Mostra a rentabilidade real do im\xF3vel enquanto ativo."},{t:"ROE (Return on Equity)",d:"Rentabilidade sobre o teu dinheiro: cashflow anual a dividir pelo capital pr\xF3prio. Responde a 'quanto rende, por ano, cada euro meu metido aqui?'."},{t:"NOI",d:"Net Operating Income (rendimento operacional l\xEDquido): renda menos despesas de explora\xE7\xE3o e IRS, sem contar a presta\xE7\xE3o do cr\xE9dito. Mostra quanto o im\xF3vel rende independentemente de como foi financiado."},{t:"Taxa de ocupa\xE7\xE3o",d:"A percentagem do tempo em que o im\xF3vel est\xE1 arrendado a gerar renda. Importa sobretudo no Alojamento Local; em longa dura\xE7\xE3o assume-se 100%."},{t:"Break-even",d:"O ponto de equil\xEDbrio: ao fim de quantos meses o cashflow acumulado iguala o capital pr\xF3prio investido. A partir da\xED, recuperaste o investimento inicial."}]},{grupo:"Impostos sobre rendas e venda",cor:v.neg,termos:[{t:"IRS sobre rendas \u2014 Categoria F",d:"Regime normal
